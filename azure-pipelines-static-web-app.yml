trigger:
  branches:
    include:
      - main
  paths:
    include:
      - frontend/**
      - azure-pipelines-static-web-app.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - frontend/**
      - azure-pipelines-static-web-app.yml

pool:
  vmImage: ubuntu-latest

variables:
  frontend_dir: frontend
  build_output_dir: frontend/dist
  node_version: 20.x
  pnpm_version: '9'

steps:
  - checkout: self
    clean: true

  - task: NodeTool@0
    displayName: Use Node.js $(node_version)
    inputs:
      versionSpec: $(node_version)

  - script: |
      corepack enable
      npm install --global pnpm@$(pnpm_version)
      pnpm --version
    displayName: Install pnpm

  - script: pnpm install --frozen-lockfile
    displayName: Install frontend dependencies
    workingDirectory: $(frontend_dir)

  - script: pnpm type-check
    displayName: Type-check frontend
    workingDirectory: $(frontend_dir)

  - script: pnpm build
    displayName: Build frontend
    workingDirectory: $(frontend_dir)
    env:
      VITE_BACKEND_URL: $(VITE_BACKEND_URL)
      VITE_MSAL_CLIENT_ID: $(VITE_MSAL_CLIENT_ID)
      VITE_MSAL_AUTHORITY: $(VITE_MSAL_AUTHORITY)
      VITE_MSAL_REDIRECT_URI: $(VITE_MSAL_REDIRECT_URI)
      VITE_MSAL_API_SCOPE: $(VITE_MSAL_API_SCOPE)

  - task: AzureStaticWebApp@0
    displayName: Deploy frontend to Azure Static Web Apps
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'), ne(variables['Build.Reason'], 'PullRequest'))
    inputs:
      app_location: $(build_output_dir)
      output_location: ''
      skip_app_build: true
      skip_api_build: true
      azure_static_web_apps_api_token: $(azure_static_web_apps_api_token)
      production_branch: main