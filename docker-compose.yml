services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      - CORS_ORIGINS='["http://localhost:5173"]'
      - AZURE_DOC_INTEL_ENDPOINT=https://di-redactor-dev.cognitiveservices.azure.com
      - AZURE_OPENAI_ENDPOINT=https://ai-redactor-dev-sweden.cognitiveservices.azure.com
      - AZURE_OPENAI_API_VERSION=2025-03-01-preview
      - AZURE_LANGUAGE_ENDPOINT=https://lang-redactor-dev.cognitiveservices.azure.com
      - AZURE_STORAGE_ACCOUNT_URL=https://stredactordev.blob.core.windows.net
      - AZURE_STORAGE_CONTAINER=redacted-jobs
      - COSMOS_ENDPOINT=https://test.documents.azure.com:443/
      - COSMOS_DB_NAME=RedactorDB
      - ENABLE_PII_SERVICE=true
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src:ro
    command: uvicorn --app-dir /app/src redactor.main:app --host 0.0.0.0 --port 8000

  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://backend:8000
    command: sh -c "npm ci --silent && npm run dev -- --host 0.0.0.0"
